version: '3.9'

services:

  api:
    build: .

    ports:
      - "8000:8000"

    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: unity_game

    ports:
      - "3306:3306"

  redis:
    image: redis:7